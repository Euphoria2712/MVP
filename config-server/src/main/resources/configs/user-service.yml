spring:
  datasource:
    url: jdbc:mysql://localhost:3306/kuanto_users
    username: root
    password:              # vacío — Laragon no tiene contraseña por defecto
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate   # crea las tablas automáticamente
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true   # para bases de datos que ya existen

jwt:
  secret: cuanto-super-secret-key-2024-development-only
  expiration: 86400000